
services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - MAGIC_RESUME_ACCESS_KEY=${MAGIC_RESUME_ACCESS_KEY:-}
    volumes:
      - magic_resume_data:/app/data
    restart: always

volumes:
  magic_resume_data:
